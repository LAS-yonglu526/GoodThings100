<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>好事100 - 下载</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #E8ECF1 0%, #F5F0EB 100%);
      color: #2D3436;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: rgba(255,255,255,0.7);
      border-radius: 28px;
      padding: 44px 32px 32px;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(45,52,54,0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .logo {
      display: flex; align-items: center; justify-content: center;
      width: 88px; height: 88px; font-size: 48px;
      background: linear-gradient(135deg, #FFE0E5, #FFF3CD);
      border-radius: 22px;
      margin: 0 auto 16px auto;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    }
    .logo img { width: 88px; height: 88px; border-radius: 22px; object-fit: cover; }
    h1 { font-size: 26px; font-weight: 800; margin-bottom: 2px; letter-spacing: 2px; }
    .ver { font-size: 13px; color: #7A8A9E; margin-bottom: 28px; }
    .dl {
      display: inline-block;
      background: #2D3436;
      color: #FFF;
      font-size: 18px;
      font-weight: 700;
      padding: 18px 48px;
      border-radius: 18px;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 6px 20px rgba(45,52,54,0.25);
      margin-bottom: 8px;
    }
    .dl:active { transform: scale(0.96); }
    .dl-hint { font-size: 12px; color: #B2BEC3; margin-bottom: 28px; }
    .steps {
      text-align: left;
      background: rgba(0,0,0,0.03);
      border-radius: 14px;
      padding: 16px 18px;
    }
    .steps-title { font-size: 13px; color: #636E72; margin-bottom: 8px; font-weight: 700; }
    .steps ol { padding-left: 18px; font-size: 13px; color: #636E72; line-height: 2; }
    .footer { margin-top: 28px; font-size: 12px; color: #B2BEC3; text-align: center; }
    .footer a { color: #B2BEC3; text-decoration: none; }
  </style>
</head>
